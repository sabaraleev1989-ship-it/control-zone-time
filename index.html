<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Control Point</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --panel-color: #1a1a1a;
            --text-color: #e0e0e0;
            --overlay-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- БЛОК ОГРОМНЫХ ИГРОВЫХ КНОПОК --- */
        #game-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .team-container {
            flex: 1;
            display: flex;
            position: relative;
            border-bottom: 2px solid #333;
            overflow: hidden;
        }

        #team-a-container {
            border-color: rgba(0, 229, 255, 0.3);
        }

        #team-b-container {
            border-bottom: none;
            border-top: 2px solid rgba(255, 61, 0, 0.3);
        }

        .giant-capture-btn {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s;
            z-index: 1;
        }

        .giant-capture-btn::after {
            content: 'ЗАХВАТ';
            font-size: 3.5rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        /* Стиль мигания */
        .giant-active {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .team-info-overlay {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .giant-timer {
            font-size: 6rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            letter-spacing: 5px;
        }

        .status-label {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        /* --- СКРЫТОЕ НАЛОЖЕНИЕ С УПРАВЛЕНИЕМ --- */
        #controls-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--overlay-bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #controls-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .control-panel {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            width: 90%;
            max-width: 600px;
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 10px;
            font-size: 2rem;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
        }

        .main-timer-block {
            text-align: center;
        }

        #game-timer-display {
            font-size: 5rem;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.4);
            margin: 10px 0;
        }

        /* Кнопки настройки времени (стрелки) */
        .time-adjustment {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .adjust-btn {
            font-size: 2.5rem;
            width: 60px;
            height: 60px;
            background: #333;
            border: 2px solid #555;
            color: #ccc;
            border-radius: 5px;
            cursor: pointer;
        }

        .adjust-btn:active { background: #555; }

        .system-buttons {
            display: flex;
            gap: 15px;
            width: 100%;
        }

        .sys-btn {
            flex: 1;
            padding: 15px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: inherit;
        }

        .start-btn { background: #00ff00; color: #000; }
        .reset-btn { background: #444; color: #ccc; }

        /* Кнопка вызова меню */
        #toggle-menu-btn {
            position: fixed;
            bottom: 10px; right: 10px;
            width: 60px; height: 60px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            font-size: 1.5rem;
            z-index: 99;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

    </style>
</head>
<body>

    <div id="game-interface">
        
        <div id="team-a-container" class="team-container">
            <button id="giant-b1" class="giant-capture-btn" style="background-color: rgba(0, 229, 255, 0.05)" onclick="handleGiantCapture(1)"></button>
            <div class="team-info-overlay">
                <div id="giant-t1" class="giant-timer" style="color: #00e5ff">00:00</div>
                <div class="status-label">TEAM A</div>
            </div>
        </div>

        <div id="team-b-container" class="team-container">
            <button id="giant-b2" class="giant-capture-btn" style="background-color: rgba(255, 61, 0, 0.05)" onclick="handleGiantCapture(2)"></button>
            <div class="team-info-overlay">
                <div id="giant-t2" class="giant-timer" style="color: #ff3d00">00:00</div>
                <div class="status-label">TEAM B</div>
            </div>
        </div>
    </div>

    <button id="toggle-menu-btn" onclick="toggleMenuDisplay()"><i class="gear-icon">⚙</i></button>

    <div id="controls-overlay">
        <button class="close-btn" onclick="toggleMenuDisplay()">✕</button>
        
        <div class="control-panel">
            <div class="main-timer-block">
                <div class="status-label">ВРЕМЯ ИГРЫ (ОСТАЛОСЬ)</div>
                <div id="game-timer-display">30:00</div>
            </div>

            <div class="main-timer-block">
                <div class="status-label">УСТАНОВКА ВРЕМЕНИ</div>
                <div class="time-adjustment">
                    <button class="adjust-btn" onclick="adjustGameTime(-60)">-1 мин</button>
                    <button class="adjust-btn" onclick="adjustGameTime(60)">+1 мин</button>
                </div>
            </div>

            <div class="system-buttons">
                <button id="giant-start-btn" class="sys-btn start-btn" onclick="handleGameStartPause()">СТАРТ</button>
                <button class="sys-btn reset-btn" onclick="handleGameReset()">СБРОС</button>
            </div>
        </div>
    </div>

    <script>
        // Инициализация звука (громкий резкий сигнал)
        const giantAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_proximity.ogg');
        
        // Логика таймеров
        let giantGameTime = 1800; // 30 минут по умолчанию
        let giantTeamTimes = [0, 0, 0]; // Времена удержания (индексы 1 и 2)
        let giantActiveTeam = null; // Какая команда держит точку
        let giantRunning = false; // Идет ли игра
        let giantInterval = null; // Ссылка на интервал tick

        // Форматирование времени в ММ:СС
        function formatGiantTime(s) {
            let mins = Math.floor(s / 60);
            let secs = s % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Обновление общего времени игры (только когда игра на паузе)
        function adjustGameTime(amount) {
            if (giantRunning) return;
            giantGameTime = Math.max(0, giantGameTime + amount);
            document.getElementById('game-timer-display').innerText = formatGiantTime(giantGameTime);
        }

        // Переключение меню управления
        function toggleMenuDisplay() {
            const overlay = document.getElementById('controls-overlay');
            overlay.classList.toggle('visible');
        }

        // Старт/Пауза игры
        function handleGameStartPause() {
            const btn = document.getElementById('giant-start-btn');
            if (giantRunning) {
                // ПАУЗА
                giantRunning = false;
                clearInterval(giantInterval);
                btn.innerText = "ПРОДОЛЖИТЬ";
                btn.style.background = "#ff9800"; // Оранжевый на паузе
                
                // Визуально гасим игровые кнопки
                document.getElementById('giant-b1').classList.remove('giant-active');
                document.getElementById('giant-b2').classList.remove('giant-active');
                
            } else {
                // СТАРТ
                if (giantGameTime <= 0) return;
                giantRunning = true;
                giantInterval = setInterval(giantTick, 1000);
                btn.innerText = "ПАУЗА";
                btn.style.background = "#fff"; // Белый в игре
                btn.style.color = "#000";
                toggleMenuDisplay(); // Скрываем меню после старта
            }
        }

        // Обработка захвата точки
        function handleGiantCapture(team) {
            if (!giantRunning) return; // Кнопки не работают на паузе
            
            giantActiveTeam = team;
            
            const b1 = document.getElementById('giant-b1');
            const b2 = document.getElementById('giant-b2');

            // Сбрасываем визуализацию
            b1.classList.remove('giant-active');
            b1.style.backgroundColor = 'rgba(0, 229, 255, 0.05)';
            
            b2.classList.remove('giant-active');
            b2.style.backgroundColor = 'rgba(255, 61, 0, 0.05)';

            // Применяем визуализацию для активной команды
            if (team === 1) {
                b1.classList.add('giant-active');
                b1.style.backgroundColor = '#00e5ff'; // Плотная заливка при захвате
            } else {
                b2.classList.add('giant-active');
                b2.style.backgroundColor = '#ff3d00';
            }
        }

        // Основной цикл таймера (раз в секунду)
        function giantTick() {
            if (giantGameTime <= 0) {
                // ВРЕМЯ ИСТЕКЛО
                clearInterval(giantInterval);
                giantRunning = false;
                giantActiveTeam = null;
                giantAlarm.play();
                alert("КОНЕЦ ИГРЫ!");
                return;
            }

            giantGameTime--;
            document.getElementById('game-timer-display').innerText = formatGiantTime(giantGameTime);
            
            if (giantActiveTeam) {
                giantTeamTimes[giantActiveTeam]++;
                document.getElementById('giant-t' + giantActiveTeam).innerText = formatGiantTime(giantTeamTimes[giantActiveTeam]);
            }
        }

        // Сброс всего
        function handleGameReset() {
            if (confirm("Точно сбросить?")) {
                giantAlarm.pause();
                giantAlarm.currentTime = 0;
                location.reload();
            }
        }
    </script>
</body>
</html>
