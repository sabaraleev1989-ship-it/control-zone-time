<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion.Gen2 Tactical</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #00e5ff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ИГРОВЫЕ КНОПКИ */
        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s;
            border: 1px solid #222;
            z-index: 1;
        }

        .team-label {
            position: absolute;
            top: 20px; left: 30px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.4;
            z-index: 10;
        }

        .giant-timer {
            font-size: clamp(4rem, 20vw, 9rem);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            z-index: 20; /* Всегда выше заливки */
            pointer-events: none;
        }

        /* Состояния захвата */
        .active-a { background-color: var(--team-a-color) !important; animation: pulse 1.2s infinite; }
        .active-a .giant-timer, .active-a .team-label { color: #000 !important; opacity: 1; }

        .active-b { background-color: var(--team-b-color) !important; animation: pulse 1.2s infinite; }
        .active-b .giant-timer, .active-b .team-label { color: #000 !important; opacity: 1; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        /* МЕНЮ УПРАВЛЕНИЯ */
        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        #game-clock {
            font-size: 5rem;
            color: #39ff14;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        .sys-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 2.5rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
        }

        .adjust-btn { font-size: 1.2rem; padding: 10px 20px; background: #333; color: #fff; border-radius: 5px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div class="team-label">TEAM A</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div class="team-label">TEAM B</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div style="display: flex; gap: 30px; align-items: center;">
            <div style="text-align: center;">
                <span style="font-size: 0.8rem; color: #888;">ЦВЕТ A</span><br>
                <input type="color" id="pick-a" value="#00e5ff" oninput="updateColors()" style="width:60px; height:60px; border-radius:50%; border:none;">
            </div>
            
            <div style="text-align: center; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;">
                <div id="game-clock">30:00</div>
                <button class="adjust-btn" onclick="adj(-60)">-1 МИН</button>
                <button class="adjust-btn" onclick="adj(60)">+1 МИН</button>
            </div>

            <div style="text-align: center;">
                <span style="font-size: 0.8rem; color: #888;">ЦВЕТ B</span><br>
                <input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()" style="width:60px; height:60px; border-radius:50%; border:none;">
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; gap: 20px;">
            <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
            <button class="sys-btn" style="background: #444; color: #fff;" onclick="location.reload()">СБРОС</button>
            <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">В ИГРУ</button>
        </div>
    </div>

    <script>
        let gameTime = 1800;
        let teamTimes = [0, 0, 0];
        let active = null;
        let running = false;
        let interval = null;

        // ЗВУКИ
        const tickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const endAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_proximity.ogg');

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateColors() {
            const ca = document.getElementById('pick-a').value;
            const cb = document.getElementById('pick-b').value;
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            if(active !== 1) document.getElementById('timer-a').style.color = ca;
            if(active !== 2) document.getElementById('timer-b').style.color = cb;
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            // Разблокировка звука для мобилок
            tickSound.play().then(() => tickSound.pause());
            const btn = document.getElementById('start-btn');
            if (running) {
                running = false;
                clearInterval(interval);
                btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                running = true;
                interval = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            active = t;
            document.getElementById('half-a').className = 'team-half' + (t === 1 ? ' active-a' : '');
            document.getElementById('half-b').className = 'team-half' + (t === 2 ? ' active-b' : '');
            
            // Звук при нажатии
            tickSound.currentTime = 0;
            tickSound.play();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(interval);
                endAlarm.play();
                alert("РАУНД ЗАКОНЧЕН!");
                return;
            }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            
            if (active) {
                // Тиканье каждую секунду захвата
                tickSound.currentTime = 0;
                tickSound.play();
                
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }

        updateColors();
    </script>
</body>
</html>
