<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scorpion.Gen2 Tactical Clock</title>
    
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1a1a1a;
            --accent-blue: #00d2ff;
            --accent-red: #ff2e2e;
            --accent-green: #39ff14;
            --border-color: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        .header-title {
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #444;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .main-layout {
            display: flex;
            gap: 15px;
            align-items: stretch;
            width: 95vw;
            max-width: 900px;
            height: 70vh;
        }

        /* Панели команд */
        .team-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--panel-color);
            padding: 15px;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            align-items: center;
        }

        .team-timer {
            font-size: 3.5rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Огромные квадратные кнопки */
        .capture-btn {
            flex-grow: 1;
            width: 100%;
            border: 4px solid #333;
            border-radius: 10px;
            background: #222;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .capture-btn::after {
            content: 'ЗАХВАТ';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: rgba(255,255,255,0.2);
        }

        /* Центр управления */
        .center-controls {
            width: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #444;
        }

        /* Настройка времени кнопками */
        .time-setter {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .setter-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .set-btn {
            width: 45px;
            height: 45px;
            background: #333;
            border: 1px solid #555;
            color: white;
            font-size: 1.5rem;
            border-radius: 5px;
            cursor: pointer;
        }

        .set-btn:active { background: #555; }

        #main-display {
            font-size: 4rem;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            margin: 15px 0;
        }

        /* Системные кнопки */
        .action-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .start-btn { background: var(--accent-green); color: #000; }
        .reset-btn { background: #444; color: #ccc; }

        /* Анимации мигания */
        .blink-blue { animation: bg-blue 1s infinite; border-color: var(--accent-blue); }
        .blink-red { animation: bg-red 1s infinite; border-color: var(--accent-red); }

        @keyframes bg-blue {
            0%, 100% { background: #002b36; }
            50% { background: var(--accent-blue); }
        }
        @keyframes bg-red {
            0%, 100% { background: #360000; }
            50% { background: var(--accent-red); }
        }

        .color-label { font-size: 0.7rem; color: #666; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="header-title">SCORPION.GEN2</div>

    <div class="main-layout">
        <div class="team-section">
            <input type="color" id="c1" value="#00d2ff">
            <div id="t1" class="team-timer" style="color: var(--accent-blue)">00:00</div>
            <button id="b1" class="capture-btn" onclick="capture(1)"></button>
            <div class="color-label">TEAM A</div>
        </div>

        <div class="center-controls">
            <div class="time-setter">
                <span class="color-label">УСТАНОВКА ВРЕМЕНИ</span>
                <div class="setter-row">
                    <button class="set-btn" onclick="adjustTime(60)">+</button>
                    <button class="set-btn" onclick="adjustTime(-60)">-</button>
                    <span style="font-size: 0.8rem">МИН</span>
                </div>
                <div id="main-display">30:00</div>
                <div class="setter-row">
                    <button class="set-btn" onclick="adjustTime(10)">+</button>
                    <button class="set-btn" onclick="adjustTime(-10)">-</button>
                    <span style="font-size: 0.8rem">СЕК</span>
                </div>
            </div>

            <div class="system-actions">
                <button id="state-btn" class="action-btn start-btn" onclick="toggleGame()">СТАРТ</button>
                <button class="action-btn reset-btn" onclick="reset()">СБРОС</button>
            </div>
        </div>

        <div class="team-section">
            <input type="color" id="c2" value="#ff2e2e">
            <div id="t2" class="team-timer" style="color: var(--accent-red)">00:00</div>
            <button id="b2" class="capture-btn" onclick="capture(2)"></button>
            <div class="color-label">TEAM B</div>
        </div>
    </div>

    <script>
        let totalTime = 1800; 
        let teamTimes = [0, 0, 0];
        let active = null;
        let running = false;
        let timer = null;
        const alarm = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_proximity.ogg');

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function adjustTime(amount) {
            if (running) return;
            totalTime = Math.max(0, totalTime + amount);
            document.getElementById('main-display').innerText = format(totalTime);
        }

        function toggleGame() {
            const btn = document.getElementById('state-btn');
            if (running) {
                running = false;
                clearInterval(timer);
                btn.innerText = "ПРОДОЛЖИТЬ";
                btn.style.background = "orange";
            } else {
                if (totalTime <= 0) return;
                running = true;
                timer = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                btn.style.background = "#333";
                btn.style.color = "#fff";
            }
        }

        function capture(team) {
            if (!running) return;
            active = team;
            const b1 = document.getElementById('b1');
            const b2 = document.getElementById('b2');
            
            b1.classList.remove('blink-blue');
            b2.classList.remove('blink-red');
            b1.style.background = "#222";
            b2.style.background = "#222";

            if (team === 1) {
                b1.classList.add('blink-blue');
                document.documentElement.style.setProperty('--accent-blue', document.getElementById('c1').value);
            } else {
                b2.classList.add('blink-red');
                document.documentElement.style.setProperty('--accent-red', document.getElementById('c2').value);
            }
        }

        function tick() {
            if (totalTime <= 0) {
                clearInterval(timer);
                alarm.play();
                alert("ВРЕМЯ ИСТЕКЛО!");
                return;
            }
            totalTime--;
            document.getElementById('main-display').innerText = format(totalTime);
            
            if (active) {
                teamTimes[active]++;
                document.getElementById('t' + active).innerText = format(teamTimes[active]);
            }
        }

        function reset() {
            if (confirm("Сбросить игру?")) location.reload();
        }

        // Обновление цветов текста при выборе
        document.getElementById('c1').onchange = (e) => document.getElementById('t1').style.color = e.target.value;
        document.getElementById('c2').onchange = (e) => document.getElementById('t2').style.color = e.target.value;
    </script>
</body>
</html>
