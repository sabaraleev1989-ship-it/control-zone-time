<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion Tactical G2</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0c0c">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #ffffff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
            transition: filter 0.2s ease, opacity 0.2s ease;
        }

        #half-a { background-color: var(--team-a-color); color: #000; }
        #half-b { background-color: var(--team-b-color); color: #fff; }

        .team-label {
            position: absolute;
            top: 40px; left: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            text-transform: uppercase;
        }

        .giant-timer {
            font-size: clamp(4rem, 22vw, 10rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes active-pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .active {
            z-index: 5;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.1);
            animation: active-pulse 1s infinite;
        }

        .dimmed {
            filter: brightness(0.2);
            opacity: 0.5 !important;
        }

        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 25px;
            gap: 15px;
        }

        #game-clock {
            font-size: 4.5rem;
            color: #39ff14;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .time-btns {
            display: flex;
            gap: 15px;
        }

        .time-btn {
            padding: 15px 25px;
            border-radius: 15px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            font-size: 1rem;
            font-weight: bold;
            active: background: #444;
        }

        input[type="color"] {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: none;
            -webkit-appearance: none;
        }

        .sys-btn {
            width: 85%;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 20px;
            border: none;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 65px; height: 65px;
            border-radius: 50%;
            background: rgba(150,150,150,0.25);
            color: #fff;
            font-size: 1.8rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div id="label-a" class="team-label">СТОРОНА «...»</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div id="label-b" class="team-label">СТОРОНА «...»</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.8rem; letter-spacing: 1px;">ОБЩЕЕ ВРЕМЯ</span>
            <div id="game-clock">30:00</div>
            <div class="time-btns">
                <button class="time-btn" onclick="adj(-60)">-1 МИН</button>
                <button class="time-btn" onclick="adj(60)">+1 МИН</button>
            </div>
        </div>

        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.8rem; letter-spacing: 1px;">ЦВЕТА СТОРОН</span>
            <div style="display: flex; gap: 50px;">
                <div style="text-align:center"><input type="color" id="pick-a" value="#ffffff" oninput="updateColors()"><br><small>A</small></div>
                <div style="text-align:center"><input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()"><br><small>B</small></div>
            </div>
        </div>

        <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
        <button class="sys-btn" style="background: #333; color: #fff;" onclick="resetGame()">СБРОС</button>
        <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">В ИГРУ</button>
    </div>

    <script>
        // Инициализация Audio API (работает локально)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let sirenOsc1 = null, sirenOsc2 = null, sirenGain = null;
        let sirenActive = false;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function getColorName(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            if (r > 230 && g > 230 && b > 230) return "БЕЛЫХ";
            if (r < 50 && g < 50 && b < 50) return "ЧЕРНЫХ";
            if (r > 200 && g < 100 && b < 100) return "КРАСНЫХ";
            if (g > 200 && r < 100 && b < 100) return "ЗЕЛЕНЫХ";
            if (b > 200 && r < 100 && g < 100) return "СИНИХ";
            if (r > 200 && g > 180 && b < 100) return "ЖЕЛТЫХ";
            if (g > 180 && b > 180 && r < 150) return "ГОЛУБЫХ";
            return "ЦВЕТНЫХ";
        }

        function playTick() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function startSiren() {
            initAudio();
            if (sirenActive) return;
            sirenActive = true;
            sirenGain = audioCtx.createGain();
            sirenOsc1 = audioCtx.createOscillator();
            sirenOsc2 = audioCtx.createOscillator();
            sirenOsc1.type = 'sawtooth';
            sirenOsc2.type = 'square';
            
            sirenGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            sirenOsc1.connect(sirenGain);
            sirenOsc2.connect(sirenGain);
            sirenGain.connect(audioCtx.destination);

            const loop = () => {
                if (!sirenActive) return;
                sirenOsc1.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.5);
                sirenOsc1.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 1.0);
                setTimeout(loop, 1000);
            };
            sirenOsc1.start();
            sirenOsc2.start();
            loop();
        }

        function stopSiren() {
            sirenActive = false;
            if (sirenOsc1) {
                sirenOsc1.stop();
                sirenOsc2.stop();
                sirenOsc1 = null;
            }
        }

        let gameTime = 1800, teamTimes = [0, 0, 0], active = null, running = false, timerId = null;

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateColors() {
            const ca = document.getElementById('pick-a').value;
            const cb = document.getElementById('pick-b').value;
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            
            const ha = document.getElementById('half-a');
            const hb = document.getElementById('half-b');
            ha.style.backgroundColor = ca;
            hb.style.backgroundColor = cb;

            const isLight = (hex) => {
                const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                return (r*0.299 + g*0.587 + b*0.114) > 150;
            };
            ha.style.color = isLight(ca) ? '#000' : '#fff';
            hb.style.color = isLight(cb) ? '#000' : '#fff';

            document.getElementById('label-a').innerText = `СТОРОНА «${getColorName(ca)}»`;
            document.getElementById('label-b').innerText = `СТОРОНА «${getColorName(cb)}»`;
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            initAudio();
            const btn = document.getElementById('start-btn');
            if (running) {
                running = false;
                clearInterval(timerId);
                btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                running = true;
                timerId = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            initAudio();
            active = t;
            document.getElementById('half-a').className = 'team-half' + (t === 1 ? ' active' : ' dimmed');
            document.getElementById('half-b').className = 'team-half' + (t === 2 ? ' active' : ' dimmed');
            playTick();
        }

        function resetGame() {
            if(confirm("Сбросить все время?")) location.reload();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(timerId);
                running = false;
                startSiren();
                setTimeout(() => {
                    alert("РАУНД ЗАВЕРШЕН!");
                    stopSiren();
                }, 100);
                return;
            }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            if (active) {
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }

        // --- OFFLINE РЕЖИМ (SERVICE WORKER) ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'scorpion-v2';
                const urlsToCache = [location.href];
                self.addEventListener('install', event => {
                    event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                });
                self.addEventListener('fetch', event => {
                    event.respondWith(caches.match(event.request).then(response => response || fetch(event.request)));
                });
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            navigator.serviceWorker.register(url);
        }

        updateColors();
    </script>
</body>
</html>
