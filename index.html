<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion Tactical G2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0c0c">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #00e5ff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
            transition: all 0.4s ease;
        }

        #half-a { background-color: var(--team-a-color); }
        #half-b { background-color: var(--team-b-color); }

        .team-label {
            position: absolute;
            top: 40px; left: 30px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .giant-timer {
            font-size: clamp(4rem, 22vw, 10rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        @keyframes active-pulse {
            0% { filter: brightness(1.2); }
            50% { filter: brightness(0.8); }
            100% { filter: brightness(1.2); }
        }

        .active {
            animation: active-pulse 1.5s ease-in-out infinite;
            z-index: 5;
            box-shadow: inset 0 0 100px rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .dimmed {
            filter: brightness(0.4);
            opacity: 0.7 !important;
        }

        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            backdrop-filter: blur(15px);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            background: rgba(255,255,255,0.07);
            padding: 20px;
            border-radius: 25px;
            gap: 10px;
        }

        #game-clock {
            font-size: 4.5rem;
            color: #39ff14;
            font-weight: bold;
        }

        .time-btn {
            padding: 15px 30px;
            border-radius: 12px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            font-size: 1rem;
        }

        input[type="color"] {
            width: 70px; height: 70px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: none;
        }

        .sys-btn {
            width: 85%;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 15px;
            border: none;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 2rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div class="team-label">TEAM A</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div class="team-label">TEAM B</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.9rem;">ОБЩЕЕ ВРЕМЯ РАУНДА</span>
            <div id="game-clock">30:00</div>
            <div style="display: flex; gap: 20px;">
                <button class="time-btn" onclick="adj(-60)">-1 МИН</button>
                <button class="time-btn" onclick="adj(60)">+1 МИН</button>
            </div>
        </div>

        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.9rem;">ЦВЕТА КОМАНД</span>
            <div style="display: flex; gap: 60px;">
                <div style="text-align:center"><input type="color" id="pick-a" value="#00e5ff" oninput="updateColors()"><br>A</div>
                <div style="text-align:center"><input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()"><br>B</div>
            </div>
        </div>

        <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
        <button class="sys-btn" style="background: #444; color: #fff;" onclick="location.reload()">СБРОС</button>
        <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">В ИГРУ</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, vol) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function beepTick() { playTone(800, 'sine', 0.1, 0.1); }
        function beepEnd() { 
            playTone(400, 'square', 1, 0.3); 
            setTimeout(() => playTone(400, 'square', 1, 0.3), 1200);
        }

        let gameTime = 1800;
        let teamTimes = [0, 0, 0];
        let active = null;
        let running = false;
        let interval = null;

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateColors() {
            const ca = document.getElementById('pick-a').value;
            const cb = document.getElementById('pick-b').value;
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            document.getElementById('half-a').style.backgroundColor = ca;
            document.getElementById('half-b').style.backgroundColor = cb;
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const btn = document.getElementById('start-btn');
            if (running) {
                running = false;
                clearInterval(interval);
                btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                running = true;
                interval = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            active = t;
            
            const ha = document.getElementById('half-a');
            const hb = document.getElementById('half-b');
            ha.classList.remove('active', 'dimmed');
            hb.classList.remove('active', 'dimmed');

            if (t === 1) {
                ha.classList.add('active');
                hb.classList.add('dimmed');
            } else {
                hb.classList.add('active');
                ha.classList.add('dimmed');
            }
            beepTick();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(interval);
                beepEnd();
                alert("ВРЕМЯ ИСТЕКЛО!");
                return;
            }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            if (active) {
                beepTick();
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }

        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => e.waitUntil(caches.open('v1').then(c => c.add(location.href))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        updateColors();
    </script>
</body>
</html>
