<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion.Gen2 Tactical</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #00e5ff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.1s;
            border: 1px solid #222;
        }

        .team-label {
            position: absolute;
            top: 20px; left: 30px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.4;
            z-index: 3;
        }

        .giant-timer {
            font-size: clamp(4rem, 20vw, 9rem);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            z-index: 5;
            pointer-events: none;
        }

        .active-a { background-color: var(--team-a-color) !important; animation: pulse 1.2s infinite; }
        .active-a .giant-timer, .active-a .team-label { color: #000 !important; }

        .active-b { background-color: var(--team-b-color) !important; animation: pulse 1.2s infinite; }
        .active-b .giant-timer, .active-b .team-label { color: #000 !important; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }

        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .panel-row { display: flex; gap: 30px; align-items: center; flex-wrap: wrap; justify-content: center; }

        #game-clock { font-size: 5rem; color: #39ff14; font-family: 'Courier New', monospace; }

        .sys-btn { padding: 18px 35px; font-size: 1.3rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; }

        #menu-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 2rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
        }

        .label-text { font-size: 0.7rem; color: #888; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div class="team-label">TEAM A</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div class="team-label">TEAM B</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="panel-row">
            <div style="text-align: center; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px;">
                <span class="label-text">ВРЕМЯ РАУНДА</span>
                <div id="game-clock">30:00</div>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button style="padding:10px" onclick="adj(-60)">-1 МИН</button>
                    <button style="padding:10px" onclick="adj(60)">+1 МИН</button>
                </div>
            </div>
        </div>

        <div class="panel-row" style="margin-top: 20px;">
            <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
            <button class="sys-btn" style="background: #444; color: #fff;" onclick="location.reload()">СБРОС</button>
            <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">ЗАКРЫТЬ</button>
        </div>
        <p style="font-size: 0.7rem; color: #555;">Звук активируется после нажатия СТАРТ</p>
    </div>

    <script>
        let gameTime = 1800;
        let teamTimes = [0, 0, 0];
        let active = null;
        let running = false;
        let interval = null;

        // ЗВУКОВЫЕ ЭФФЕКТЫ
        // Короткий "бип" для секундного отсчета
        const tickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        tickSound.volume = 0.5;

        // Громкая сирена финала
        const endAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_proximity.ogg');

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            const btn = document.getElementById('start-btn');
            // Браузеры блокируют звук до первого клика пользователя
            tickSound.play().then(() => tickSound.pause()); 
            
            if (running) {
                running = false;
                clearInterval(interval);
                btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                if (gameTime <= 0) return;
                running = true;
                interval = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            active = t;
            document.getElementById('half-a').className = 'team-half' + (t === 1 ? ' active-a' : '');
            document.getElementById('half-b').className = 'team-half' + (t === 2 ? ' active-b' : '');
            
            // Сразу воспроизводим звук при клике для отклика
            tickSound.currentTime = 0;
            tickSound.play();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(interval);
                endAlarm.play();
                alert("РАУНД ЗАКОНЧЕН!");
                return;
            }

            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            
            if (active) {
                // Воспроизводим "бип" каждую секунду, если точка захвачена
                tickSound.currentTime = 0;
                tickSound.play();
                
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }
    </script>
</body>
</html>
