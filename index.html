<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion Tactical G2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0c0c">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --team-a-color: #ffffff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #half-a { background-color: var(--team-a-color); }
        #half-b { background-color: var(--team-b-color); }

        .team-label {
            position: absolute;
            top: 40px; left: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .giant-timer {
            font-size: clamp(4rem, 22vw, 10rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        /* АКТИВНАЯ СТОРОНА: ЯРКАЯ И МИГАЮЩАЯ */
        .active {
            z-index: 5;
            transform: scale(1.03); /* Слегка увеличиваем активную зону */
            filter: brightness(1.2);
            animation: aggressive-strobe 0.8s steps(2, start) infinite;
        }

        @keyframes aggressive-strobe {
            0% { 
                filter: brightness(2.0) contrast(1.4);
                box-shadow: inset 0 0 100px rgba(255,255,255,0.7);
            }
            50% { 
                filter: brightness(1.0);
                box-shadow: inset 0 0 200px rgba(0,0,0,0.4);
            }
        }

        /* НЕАКТИВНАЯ СТОРОНА: ВИДНО ЦВЕТ, НО ОНА В ТЕНИ */
        .dimmed {
            filter: brightness(0.35) saturate(0.8); /* Цвет виден, но приглушен */
            opacity: 0.7;
            transform: scale(0.97); /* Немного уменьшаем визуально */
        }

        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 10, 10, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 25px;
            gap: 10px;
        }

        #game-clock {
            font-size: 4.5rem;
            color: #39ff14;
            font-weight: bold;
        }

        .time-btn {
            padding: 15px 25px;
            border-radius: 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            font-weight: bold;
        }

        input[type="color"] {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: none;
            -webkit-appearance: none;
        }

        .sys-btn {
            width: 85%;
            padding: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 20px;
            border: none;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 75px; height: 75px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 2.2rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div id="label-a" class="team-label">СТОРОНА «...»</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div id="label-b" class="team-label">СТОРОНА «...»</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="menu-section">
            <span style="color:#ccc;">ВРЕМЯ РАУНДА</span>
            <div id="game-clock">30:00</div>
            <div style="display: flex; gap: 15px;">
                <button class="time-btn" onclick="adj(-60)">-1 МИН</button>
                <button class="time-btn" onclick="adj(60)">+1 МИН</button>
            </div>
        </div>

        <div class="menu-section">
            <span style="color:#ccc;">ЦВЕТА СТОРОН</span>
            <div style="display: flex; gap: 40px;">
                <div style="text-align:center"><input type="color" id="pick-a" value="#ffffff" oninput="updateColors()"><br>A</div>
                <div style="text-align:center"><input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()"><br>B</div>
            </div>
        </div>

        <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
        <button class="sys-btn" style="background: #cc0000; color: #fff;" onclick="hardReset()">СБРОС ИГРЫ</button>
        <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">ВЕРНУТЬСЯ</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let sirenOsc1, sirenOsc2, sirenGain, sirenActive = false;
        let gameTime = 1800, teamTimes = [0, 0, 0], active = null, running = false, timerId = null;

        function getColorName(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            if (r > 220 && g > 220 && b > 220) return "БЕЛЫХ";
            if (r < 80 && g < 80 && b < 80) return "ЧЕРНЫХ";
            if (r > 180 && g < 110 && b < 110) return "КРАСНЫХ";
            if (g > 160 && r < 120 && b < 120) return "ЗЕЛЕНЫХ";
            if (b > 180 && r < 120 && g < 120) return "СИНИХ";
            if (r > 180 && g > 160 && b < 110) return "ЖЕЛТЫХ";
            return "ЦВЕТНЫХ";
        }

        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function startSiren() {
            if (sirenActive) return; sirenActive = true;
            sirenGain = audioCtx.createGain(); sirenOsc1 = audioCtx.createOscillator(); sirenOsc2 = audioCtx.createOscillator();
            sirenOsc1.type = 'sawtooth'; sirenOsc2.type = 'square';
            sirenGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            sirenOsc1.connect(sirenGain); sirenOsc2.connect(sirenGain); sirenGain.connect(audioCtx.destination);
            const loop = () => { if (!sirenActive) return; sirenOsc1.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.5); sirenOsc1.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1.0); setTimeout(loop, 1000); };
            sirenOsc1.start(); sirenOsc2.start(); loop();
        }

        function stopSiren() { sirenActive = false; if (sirenOsc1) { sirenOsc1.stop(); sirenOsc2.stop(); } }

        function format(s) { return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`; }

        function toggleMenu() { const m = document.getElementById('controls-overlay'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }

        function updateColors() {
            const ca = document.getElementById('pick-a').value, cb = document.getElementById('pick-b').value;
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            const ha = document.getElementById('half-a'), hb = document.getElementById('half-b');
            ha.style.backgroundColor = ca; hb.style.backgroundColor = cb;
            const isLight = (hex) => { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return (r*0.299 + g*0.587 + b*0.114) > 160; };
            ha.style.color = isLight(ca) ? '#000' : '#fff'; hb.style.color = isLight(cb) ? '#000' : '#fff';
            document.getElementById('label-a').innerText = `СТОРОНА «${getColorName(ca)}»`;
            document.getElementById('label-b').innerText = `СТОРОНА «${getColorName(cb)}»`;
        }

        function adj(amt) { if (running) return; gameTime = Math.max(0, gameTime + amt); document.getElementById('game-clock').innerText = format(gameTime); }

        function start() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const btn = document.getElementById('start-btn');
            if (running) { running = false; clearInterval(timerId); btn.innerText = "ПРОДОЛЖИТЬ"; } 
            else { running = true; timerId = setInterval(tick, 1000); btn.innerText = "ПАУЗА"; toggleMenu(); }
        }

        function hardReset() { if(confirm("Сбросить игру?")) location.reload(); }

        function capture(t) {
            if (!running) return;
            active = t;
            document.getElementById('half-a').className = 'team-half' + (t === 1 ? ' active' : ' dimmed');
            document.getElementById('half-b').className = 'team-half' + (t === 2 ? ' active' : ' dimmed');
            playTick();
        }

        function tick() {
            if (gameTime <= 0) { clearInterval(timerId); running = false; startSiren(); setTimeout(() => { alert("ВРЕМЯ ВЫШЛО!"); stopSiren(); }, 100); return; }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            if (active) { teamTimes[active]++; document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]); }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => console.log('Ready'));
            });
        }

        updateColors();
    </script>
</body>
</html>
