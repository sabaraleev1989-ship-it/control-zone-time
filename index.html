<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion Tactical G2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #00e5ff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #222;
            z-index: 1;
            transition: background-color 0.4s, opacity 0.4s, filter 0.4s;
        }

        /* Начальные цвета фона на основе переменных */
        #half-a { background-color: var(--team-a-color); opacity: 0.8; }
        #half-b { background-color: var(--team-b-color); opacity: 0.8; }

        .team-label {
            position: absolute;
            top: 20px; left: 30px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            z-index: 10;
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .giant-timer {
            font-size: clamp(4rem, 20vw, 9rem);
            font-weight: bold;
            font-family: 'Courier New', monospace;
            z-index: 20;
            pointer-events: none;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,0,0,0.6);
        }

        /* АНИМАЦИЯ МИГАНИЯ ДЛЯ АКТИВНОЙ КОМАНДЫ */
        @keyframes active-pulse {
            0% { filter: brightness(1.2); opacity: 1; }
            50% { filter: brightness(0.7); opacity: 0.9; }
            100% { filter: brightness(1.2); opacity: 1; }
        }

        .active {
            animation: active-pulse 1.5s ease-in-out infinite;
            border: 4px solid #fff;
            z-index: 5;
        }

        /* СОСТОЯНИЕ ТУСКЛОЙ (НЕАКТИВНОЙ) КОМАНДЫ */
        .dimmed {
            filter: brightness(0.2) grayscale(0.5);
            opacity: 0.3 !important;
        }

        /* ВЕРТИКАЛЬНОЕ МЕНЮ */
        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 20px;
            gap: 10px;
        }

        #game-clock {
            font-size: 4rem;
            color: #39ff14;
            font-family: 'Courier New', monospace;
        }

        input[type="color"] {
            width: 65px; height: 65px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: none;
            cursor: pointer;
        }

        .sys-btn {
            width: 85%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 20px; right: 20px;
            width: 70px; height: 70px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 2rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div class="team-label">TEAM A</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div class="team-label">TEAM B</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="menu-section">
            <span style="color:#888">ОБЩЕЕ ВРЕМЯ</span>
            <div id="game-clock">30:00</div>
            <div style="display: flex; gap: 20px;">
                <button style="padding:12px 25px; border-radius:10px;" onclick="adj(-60)">-1 МИН</button>
                <button style="padding:12px 25px; border-radius:10px;" onclick="adj(60)">+1 МИН</button>
            </div>
        </div>

        <div class="menu-section">
            <span style="color:#888">ЦВЕТА КОМАНД</span>
            <div style="display: flex; gap: 50px;">
                <div style="text-align:center"><input type="color" id="pick-a" value="#00e5ff" oninput="updateColors()"><br>A</div>
                <div style="text-align:center"><input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()"><br>B</div>
            </div>
        </div>

        <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
        <button class="sys-btn" style="background: #444; color: #fff;" onclick="location.reload()">СБРОС</button>
        <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">В ИГРУ</button>
    </div>

    <script>
        let gameTime = 1800;
        let teamTimes = [0, 0, 0];
        let active = null;
        let running = false;
        let interval = null;

        const tickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
        const endAlarm = new Audio('https://actions.google.com/sounds/v1/alarms/alarm_clock_ringing_proximity.ogg');

        function format(s) {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // Обновление цветов в реальном времени
        function updateColors() {
            const ca = document.getElementById('pick-a').value;
            const cb = document.getElementById('pick-b').value;
            
            // Сохраняем в переменные CSS
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            
            // Сразу перекрашиваем фон кнопок
            document.getElementById('half-a').style.backgroundColor = ca;
            document.getElementById('half-b').style.backgroundColor = cb;
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            tickSound.play().then(() => tickSound.pause());
            const btn = document.getElementById('start-btn');
            if (running) {
                running = false;
                clearInterval(interval);
                btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                running = true;
                interval = setInterval(tick, 1000);
                btn.innerText = "ПАУЗА";
                toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            active = t;
            
            const ha = document.getElementById('half-a');
            const hb = document.getElementById('half-b');

            // Сброс классов перед переключением
            ha.classList.remove('active', 'dimmed');
            hb.classList.remove('active', 'dimmed');

            if (t === 1) {
                ha.classList.add('active');
                hb.classList.add('dimmed');
            } else {
                hb.classList.add('active');
                ha.classList.add('dimmed');
            }
            
            tickSound.currentTime = 0;
            tickSound.play();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(interval);
                endAlarm.play();
                alert("РАУНД ЗАКОНЧЕН!");
                return;
            }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            if (active) {
                tickSound.currentTime = 0;
                tickSound.play();
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }
        
        // Инициализация при загрузке
        updateColors();
    </script>
</body>
</html>
