<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scorpion Tactical G2</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0c0c">

    <style>
        :root {
            --bg-color: #0c0c0c;
            --overlay-bg: rgba(10, 10, 10, 0.98);
            --team-a-color: #ffffff;
            --team-b-color: #ff3d00;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #fff;
            -webkit-user-select: none;
            user-select: none;
        }

        .team-half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1;
            transition: all 0.3s ease;
        }

        #half-a { background-color: var(--team-a-color); }
        #half-b { background-color: var(--team-b-color); }

        .team-label {
            position: absolute;
            top: 40px; left: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            text-transform: uppercase;
        }

        .giant-timer {
            font-size: clamp(4rem, 22vw, 10rem);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            z-index: 20;
            pointer-events: none;
        }

        .active {
            z-index: 5;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.15);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .dimmed {
            filter: brightness(0.2);
            opacity: 0.6 !important;
        }

        #controls-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(15px);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85%;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 25px;
            gap: 10px;
        }

        #game-clock {
            font-size: 4.5rem;
            color: #39ff14;
            font-weight: bold;
        }

        .time-btn {
            padding: 15px 25px;
            border-radius: 12px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
        }

        input[type="color"] {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: none;
        }

        .sys-btn {
            width: 85%;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 18px;
            border: none;
            text-transform: uppercase;
        }

        #menu-toggle {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 65px; height: 65px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 2rem;
            z-index: 90;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="half-a" class="team-half" onclick="capture(1)">
        <div id="label-a" class="team-label">СТОРОНА «...»</div>
        <div id="timer-a" class="giant-timer">00:00</div>
    </div>

    <div id="half-b" class="team-half" onclick="capture(2)">
        <div id="label-b" class="team-label">СТОРОНА «...»</div>
        <div id="timer-b" class="giant-timer">00:00</div>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()">⚙</button>

    <div id="controls-overlay">
        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.9rem;">ВРЕМЯ РАУНДА</span>
            <div id="game-clock">30:00</div>
            <div style="display: flex; gap: 15px;">
                <button class="time-btn" onclick="adj(-60)">-1 МИН</button>
                <button class="time-btn" onclick="adj(60)">+1 МИН</button>
            </div>
        </div>

        <div class="menu-section">
            <span style="color:#aaa; font-size: 0.9rem;">ЦВЕТА</span>
            <div style="display: flex; gap: 50px;">
                <div style="text-align:center"><input type="color" id="pick-a" value="#ffffff" oninput="updateColors()"><br>A</div>
                <div style="text-align:center"><input type="color" id="pick-b" value="#ff3d00" oninput="updateColors()"><br>B</div>
            </div>
        </div>

        <button id="start-btn" class="sys-btn" style="background: #39ff14; color: #000;" onclick="start()">СТАРТ</button>
        <button class="sys-btn" style="background: #333; color: #fff;" onclick="location.reload()">СБРОС</button>
        <button class="sys-btn" style="background: #fff; color: #000;" onclick="toggleMenu()">В ИГРУ</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let sirenOsc1 = null, sirenOsc2 = null, sirenGain = null;
        let sirenActive = false;

        function getColorName(hex) {
            const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            if (r > 230 && g > 230 && b > 230) return "БЕЛЫХ";
            if (r < 60 && g < 60 && b < 60) return "ЧЕРНЫХ";
            if (r > 200 && g < 120 && b < 120) return "КРАСНЫХ";
            if (g > 180 && r < 120 && b < 120) return "ЗЕЛЕНЫХ";
            if (b > 200 && r < 120 && g < 120) return "СИНИХ";
            if (r > 200 && g > 180 && b < 120) return "ЖЕЛТЫХ";
            if (g > 180 && b > 180 && r < 150) return "ГОЛУБЫХ";
            return "ЦВЕТНЫХ";
        }

        function playTick() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function startSiren() {
            if (sirenActive) return;
            sirenActive = true;
            sirenGain = audioCtx.createGain();
            sirenOsc1 = audioCtx.createOscillator();
            sirenOsc2 = audioCtx.createOscillator();
            sirenOsc1.type = 'sawtooth'; sirenOsc2.type = 'square';
            sirenGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            sirenOsc1.connect(sirenGain); sirenOsc2.connect(sirenGain);
            sirenGain.connect(audioCtx.destination);
            const loop = () => {
                if (!sirenActive) return;
                sirenOsc1.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.5);
                sirenOsc1.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1.0);
                setTimeout(loop, 1000);
            };
            sirenOsc1.start(); sirenOsc2.start(); loop();
        }

        function stopSiren() {
            sirenActive = false;
            if (sirenOsc1) { sirenOsc1.stop(); sirenOsc2.stop(); sirenOsc1 = null; }
        }

        let gameTime = 1800, teamTimes = [0, 0, 0], active = null, running = false, timerId = null;

        function format(s) {
            let m = Math.floor(s / 60), sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function toggleMenu() {
            const m = document.getElementById('controls-overlay');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function updateColors() {
            const ca = document.getElementById('pick-a').value, cb = document.getElementById('pick-b').value;
            document.documentElement.style.setProperty('--team-a-color', ca);
            document.documentElement.style.setProperty('--team-b-color', cb);
            
            const ha = document.getElementById('half-a'), hb = document.getElementById('half-b');
            ha.style.backgroundColor = ca; hb.style.backgroundColor = cb;

            const isLight = (hex) => {
                const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                return (r*0.299 + g*0.587 + b*0.114) > 160;
            };
            ha.style.color = isLight(ca) ? '#000' : '#fff';
            hb.style.color = isLight(cb) ? '#000' : '#fff';

            document.getElementById('label-a').innerText = `СТОРОНА «${getColorName(ca)}»`;
            document.getElementById('label-b').innerText = `СТОРОНА «${getColorName(cb)}»`;
        }

        function adj(amt) {
            if (running) return;
            gameTime = Math.max(0, gameTime + amt);
            document.getElementById('game-clock').innerText = format(gameTime);
        }

        function start() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const btn = document.getElementById('start-btn');
            if (running) {
                running = false; clearInterval(timerId); btn.innerText = "ПРОДОЛЖИТЬ";
            } else {
                running = true; timerId = setInterval(tick, 1000); btn.innerText = "ПАУЗА"; toggleMenu();
            }
        }

        function capture(t) {
            if (!running) return;
            active = t;
            document.getElementById('half-a').className = 'team-half' + (t === 1 ? ' active' : ' dimmed');
            document.getElementById('half-b').className = 'team-half' + (t === 2 ? ' active' : ' dimmed');
            playTick();
        }

        function tick() {
            if (gameTime <= 0) {
                clearInterval(timerId); running = false;
                startSiren();
                setTimeout(() => { alert("РАУНД ЗАВЕРШЕН!"); stopSiren(); }, 100);
                return;
            }
            gameTime--;
            document.getElementById('game-clock').innerText = format(gameTime);
            if (active) {
                teamTimes[active]++;
                document.getElementById(active === 1 ? 'timer-a' : 'timer-b').innerText = format(teamTimes[active]);
            }
        }

        // РЕГИСТРАЦИЯ OFFLINE РЕЖИМА С КЭШИРОВАНИЕМ ИКОНКИ
        if ('serviceWorker' in navigator) {
            const sw = `const C='v3';
            self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([location.href, 'icon.png']))));
            self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
            const blob = new Blob([sw], {type: 'text/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        updateColors();
    </script>
</body>
</html>
